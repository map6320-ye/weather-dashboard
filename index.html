<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>City Pop Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 20, 35, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-blue: #00d4ff;
            --neon-pink: #ff007f;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; color: var(--text-main); }

        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transform: scale(1.1); transition: opacity 2s ease-in-out;
        }
        .bg-image.active {
            opacity: 1; transform: scale(1);
            transition: opacity 2s ease-in-out, transform 12s linear;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.6));
            pointer-events: none;
        }

        /* 核心面板 */
        #widget-container {
            position: absolute; bottom: 40px; left: 40px; right: 40px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 20px 45px; display: flex; align-items: center; justify-content: space-between;
            z-index: 10; pointer-events: auto; box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            cursor: pointer; transition: all 0.3s ease;
        }

        .time-section { display: flex; flex-direction: column; align-items: flex-start; border-right: 1px solid rgba(255,255,255,0.2); padding-right: 40px; min-width: 250px; }
        .location-display { font-size: 1.2rem; color: var(--neon-blue); margin-bottom: 5px; }
        .location-display b { font-weight: 700; }
        .date-display { font-size: 1.1rem; color: #fff; font-weight: 700; letter-spacing: 1px; opacity: 0.9; }
        .time-display { font-family: 'Inter', sans-serif; font-size: 4rem; font-weight: 700; line-height: 0.9; color: #fff; margin-top: 5px; }

        .weather-content { display: flex; align-items: center; gap: 40px; flex-grow: 1; padding-left: 40px; }
        .current-box { display: flex; align-items: center; gap: 15px; }
        .current-temp { font-family: 'Inter', sans-serif; font-size: 3.5rem; font-weight: 700; color: #fff; }
        .current-temp span { font-size: 1.5rem; vertical-align: super; font-weight: 400; }
        .current-icon { font-size: 3.5rem; }

        .forecast-group { display: flex; gap: 30px; }
        .forecast-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .item-label { font-size: 0.9rem; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 3px; }
        .item-icon { font-size: 1.8rem; margin: 3px 0; }
        .item-temp { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .item-temp span { font-size: 0.7rem; font-weight: 400; vertical-align: super; opacity: 0.7; }
        .item-pop { font-size: 0.9rem; color: var(--neon-blue); font-weight: 500; }
        .high-pop { color: #ff4444 !important; }

        /* --- 直向模式優化：壓縮高度、縮小字體 --- */
        @media (orientation: portrait) {
            #widget-container {
                flex-direction: column;
                align-items: stretch;
                padding: 20px 25px;
                bottom: 25px; left: 20px; right: 20px;
                border-radius: 20px;
            }
            .time-section {
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.15);
                padding-right: 0; padding-bottom: 15px; margin-bottom: 15px;
                min-width: unset; width: 100%;
            }
            .time-display { font-size: 3.5rem; }
            .location-display { font-size: 1.1rem; }
            .weather-content {
                padding-left: 0; flex-direction: column; gap: 20px; align-items: stretch;
            }
            .current-box { justify-content: space-around; }
            .current-temp { font-size: 3rem; }
            .forecast-group { justify-content: space-between; gap: 10px; }
            .forecast-item { min-width: 50px; }
            .item-label { font-size: 0.8rem; }
            .item-icon { font-size: 1.5rem; }
            #hourly-container, #weekly-container { width: 100%; }
            .divider { display: none; } /* 直向隱藏分隔線 */
        }

        /* 選單樣式 */
        #location-menu {
            position: absolute; bottom: 130px; left: 40px; right: 40px; background: rgba(10,15,30,0.98);
            border: 2px solid var(--neon-blue); border-radius: 24px; padding: 35px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
            opacity: 0; transform: translateY(30px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; z-index: 100; max-height: 70vh; overflow-y: auto;
        }
        @media (orientation: portrait) {
            #location-menu { grid-template-columns: repeat(2, 1fr); padding: 20px; bottom: 100px; }
            .menu-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
        #location-menu.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        .menu-section { display: flex; flex-direction: column; gap: 15px; }
        .menu-title { font-size: 1rem; color: var(--neon-pink); font-weight: 700; border-left: 4px solid var(--neon-pink); padding-left: 10px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        
        .loc-btn {
            padding: 15px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; text-align: center; cursor: pointer; color: #fff;
            transition: all 0.2s; font-size: 1rem;
        }
        .loc-btn:hover { background: rgba(0, 212, 255, 0.2); border-color: var(--neon-blue); transform: scale(1.02); }
        .loc-btn.city-btn { font-weight: 700; font-size: 1.1rem; }
        .loc-btn.dist-btn { color: #aaaaaa; }

        /* 全螢幕按鈕提示 (非必要但加上去) */
        #fullscreen-hint {
            position: fixed; top: 20px; right: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.3); z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body ondblclick="toggleFullScreen()">
    <div id="bg-container" onclick="toggleFullScreen()"></div>
    <div class="overlay"></div>
    <div id="fullscreen-hint">連點兩下切換全螢幕</div>

    <div id="widget-container" onclick="toggleMenu(event)">
        <div class="time-section">
            <div class="location-display" id="loc-tag"><b>新北市</b> <span>新莊區</span></div>
            <div class="date-display" id="date-display">----.--.-- 星期-</div>
            <div class="time-display" id="time-display">--:--</div>
        </div>

        <div class="weather-content">
            <div class="current-box">
                <div class="current-temp" id="current-temp">--<span>°C</span></div>
                <div class="current-icon" id="current-icon">☁️</div>
            </div>
            <div class="forecast-group" id="hourly-container"></div>
            <div class="divider" style="width: 1px; height: 50px; background: rgba(255,255,255,0.2);"></div>
            <div class="forecast-group" id="weekly-container"></div>
        </div>

        <div id="location-menu" onclick="event.stopPropagation()">
            <div class="menu-section">
                <div class="menu-title">縣市選擇 (北 → 南)</div>
                <div class="menu-grid" id="city-grid"></div>
            </div>
            <div class="menu-section">
                <div class="menu-title">行政區選擇 (北 → 南)</div>
                <div class="menu-grid" id="dist-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_DRIVE_FOLDER_ID = '1apZkealXx1A3yhr1tSZlrYU7YfpN3BHP';
        const GOOGLE_DRIVE_API_KEY = 'AIzaSyDy5_yeAxfSER9yF96UHJtj41jzDtbTGOU';
        const CWA_API_KEY = 'CWA-D7AE37AC-F16E-443E-A75A-15968B49C686';

        let imageUrls = [], currentImageIndex = 0;
        let currentCity = '新北市', currentDistrict = '新莊區';

        const CITIES = [
            { label: '基隆市', city: '基隆市', dist: '中正區', id: '049' },
            { label: '臺北市', city: '臺北市', dist: '中正區', id: '061' },
            { label: '新北市', city: '新北市', dist: '板橋區', id: '069' },
            { label: '桃園市', city: '桃園市', dist: '桃園區', id: '005' },
            { label: '新竹市', city: '新竹市', dist: '東區', id: '053' },
            { label: '宜蘭縣', city: '宜蘭縣', dist: '宜蘭市', id: '001' },
            { label: '臺中市', city: '臺中市', dist: '西屯區', id: '073' }
        ];

        const DISTRICTS = [
            { label: '淡水區', city: '新北市', dist: '淡水區', id: '069' },
            { label: '板橋區', city: '新北市', dist: '板橋區', id: '069' },
            { label: '新莊區', city: '新北市', dist: '新莊區', id: '069' },
            { label: '永和區', city: '新北市', dist: '永和區', id: '069' },
            { label: '中壢區', city: '桃園市', dist: '中壢區', id: '005' },
            { label: '大甲區', city: '臺中市', dist: '大甲區', id: '073' }
        ];

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('time-display').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            const days = ['日','一','二','三','四','五','六'];
            document.getElementById('date-display').innerText = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} 星期${days[now.getDay()]}`;
        }
        setInterval(updateTime, 1000); updateTime();

        function toggleMenu(e) { e.stopPropagation(); document.getElementById('location-menu').classList.toggle('show'); }
        function selectLoc(city, dist, id) {
            currentCity = city; currentDistrict = dist;
            document.getElementById('loc-tag').innerHTML = `<b>${city.replace('臺','台')}</b> <span>${dist}</span>`;
            document.getElementById('location-menu').classList.remove('show');
            fetchWeather(id);
        }

        document.getElementById('city-grid').innerHTML = CITIES.map(item => `
            <div class="loc-btn city-btn" onclick="selectLoc('${item.city}','${item.dist}','${item.id}')">${item.label.replace('臺','台')}</div>
        `).join('');

        document.getElementById('dist-grid').innerHTML = DISTRICTS.map(item => `
            <div class="loc-btn dist-btn" onclick="selectLoc('${item.city}','${item.dist}','${item.id}')">${item.label}</div>
        `).join('');

        function getWeatherIcon(wx) {
            if (wx.includes('雷')) return '⛈️';
            if (wx.includes('雨')) return '🌧️';
            if (wx.includes('晴') && wx.includes('雲')) return '⛅';
            if (wx.includes('晴')) return '☀️';
            return '☁️';
        }

        async function fetchWeather(forcedId) {
            try {
                let item = null;
                if (forcedId) {
                    item = { id: forcedId };
                } else {
                    item = CITIES.find(i => i.city === currentCity && i.dist === currentDistrict) || 
                           DISTRICTS.find(i => i.city === currentCity && i.dist === currentDistrict) || 
                           CITIES[2];
                }
                const res2D = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-D0047-${item.id}?Authorization=${CWA_API_KEY}&LocationName=${encodeURIComponent(currentDistrict)}`);
                const data2D = await res2D.json();
                const weekId = String(parseInt(item.id) + 2).padStart(3, '0');
                const resW = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-D0047-${weekId}?Authorization=${CWA_API_KEY}&LocationName=${encodeURIComponent(currentDistrict)}`);
                const dataW = await resW.json();
                renderWeather(data2D, dataW);
            } catch (e) { console.error(e); }
        }

        function renderWeather(d2D, dW) {
            const loc = d2D.records.Locations[0].Location[0];
            const getE = (l, n) => l.WeatherElement.find(e => e.ElementName === n);
            const wx = getE(loc, '天氣現象').Time, temp = getE(loc, '溫度').Time, pop = getE(loc, '3小時降雨機率').Time;

            document.getElementById('current-temp').innerHTML = `${temp[0].ElementValue[0].Temperature}<span>°C</span>`;
            document.getElementById('current-icon').innerText = getWeatherIcon(wx[0].ElementValue[0].Weather);

            const hCont = document.getElementById('hourly-container'); hCont.innerHTML = '';
            for(let i=1; i<=4; i++) {
                const p = pop[i].ElementValue[0].ProbabilityOfPrecipitation;
                hCont.innerHTML += `<div class="forecast-item"><span class="item-label ${parseInt(p)>50?'high-pop':''}">${wx[i].StartTime.substring(11,16)}</span><span class="item-icon">${getWeatherIcon(wx[i].ElementValue[0].Weather)}</span><span class="item-temp">${temp[i].ElementValue[0].Temperature}<span>°C</span></span><span class="item-pop">${p}%</span></div>`;
            }

            const wLoc = dW.records.Locations[0].Location[0];
            const wMin = getE(wLoc, '最低溫度').Time, wMax = getE(wLoc, '最高溫度').Time, wWx = getE(wLoc, '天氣現象').Time, wPop = getE(wLoc, '12小時降雨機率').Time;
            const wCont = document.getElementById('weekly-container'); wCont.innerHTML = '';
            let added = 0, lastD = '';
            for(let i=0; i<wMin.length; i++) {
                const d = wMin[i].StartTime.substring(0,10);
                if(d === lastD || d === new Date().toISOString().substring(0,10)) continue;
                lastD = d;
                const p = wPop.find(x=>x.StartTime.includes(d))?.ElementValue[0].ProbabilityOfPrecipitation || '0';
                wCont.innerHTML += `<div class="forecast-item"><span class="item-label ${parseInt(p)>50?'high-pop':''}">${['週日','週一','週二','週三','週四','週五','週六'][new Date(d).getDay()]}</span><span class="item-icon">${getWeatherIcon(wWx.find(x=>x.StartTime.includes(d)).ElementValue[0].Weather)}</span><span class="item-temp">${wMax.find(x=>x.StartTime.includes(d)).ElementValue[0].MaxTemperature}<span>°C</span></span><span class="item-pop">${p}%</span></div>`;
                if(++added >= 4) break;
            }
        }

        async function fetchImages() {
            try {
                const q = `'${GOOGLE_DRIVE_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`;
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&key=${GOOGLE_DRIVE_API_KEY}&fields=files(id)`);
                const data = await res.json();
                if(data.files) {
                    imageUrls = data.files.map(f => `https://drive.google.com/thumbnail?id=${f.id}&sz=w1920`);
                    imageUrls.sort(() => Math.random() - 0.5);
                    startSlideshow();
                }
            } catch(e) {}
        }

        function startSlideshow() {
            const cont = document.getElementById('bg-container');
            const next = () => {
                const img = document.createElement('div'); img.className = 'bg-image';
                img.style.backgroundImage = `url('${imageUrls[currentImageIndex]}')`;
                cont.appendChild(img);
                setTimeout(() => img.classList.add('active'), 100);
                if(cont.children.length > 1) {
                    const prev = cont.children[0]; prev.style.opacity = '0';
                    setTimeout(() => prev.remove(), 2000);
                }
                currentImageIndex = (currentImageIndex + 1) % imageUrls.length;
            };
            next(); setInterval(next, 12000);
        }

        fetchWeather(); fetchImages();
        window.onclick = () => document.getElementById('location-menu').classList.remove('show');
    </script>
</body>
</html>
